name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    env:
      KASTOR_ALLOWED_ROOTS: ${{ github.workspace }}
      KASTOR_OAUTH_OWNER_TOKEN: ci-owner-token-that-is-long-enough
      KASTOR_PUBLIC_BASE_URL: http://127.0.0.1:7676

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Public check
        run: node dist/cli.js public-check
