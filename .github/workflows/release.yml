name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          asset="releases/mnod-kastor-${version}.tgz"
          test -f "$asset"
          gh release create "$GITHUB_REF_NAME" "$asset" --generate-notes --title "Kastor $GITHUB_REF_NAME"
