<svg width="960" height="420" viewBox="0 0 960 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kastor ChatGPT connection flow">
  <rect width="960" height="420" rx="28" fill="#0B1220"/>
  <rect x="28" y="28" width="904" height="364" rx="24" fill="#111827" stroke="#243244"/>
  <text x="54" y="72" fill="#E5E7EB" font-family="Inter, Segoe UI, sans-serif" font-size="28" font-weight="700">Kastor connection flow</text>
  <text x="54" y="104" fill="#94A3B8" font-family="Inter, Segoe UI, sans-serif" font-size="16">The model stays in ChatGPT. Kastor is the local tool server.</text>

  <g>
    <rect x="58" y="158" width="190" height="108" rx="18" fill="#172554" stroke="#38BDF8"/>
    <text x="92" y="204" fill="#E0F2FE" font-family="Inter, Segoe UI, sans-serif" font-size="22" font-weight="700">ChatGPT</text>
    <text x="92" y="234" fill="#BAE6FD" font-family="Inter, Segoe UI, sans-serif" font-size="15">asks and decides</text>
  </g>

  <path d="M258 212H350" stroke="#38BDF8" stroke-width="4" stroke-linecap="round"/>
  <path d="M338 198L354 212L338 226" stroke="#38BDF8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="279" y="190" fill="#7DD3FC" font-family="Inter, Segoe UI, sans-serif" font-size="14">/mcp</text>

  <g>
    <rect x="368" y="134" width="224" height="156" rx="20" fill="#052E2B" stroke="#2DD4BF"/>
    <text x="424" y="186" fill="#CCFBF1" font-family="Inter, Segoe UI, sans-serif" font-size="26" font-weight="800">Kastor</text>
    <text x="408" y="220" fill="#99F6E4" font-family="Inter, Segoe UI, sans-serif" font-size="15">owner approval</text>
    <text x="405" y="248" fill="#99F6E4" font-family="Inter, Segoe UI, sans-serif" font-size="15">permission checks</text>
  </g>

  <path d="M604 212H696" stroke="#2DD4BF" stroke-width="4" stroke-linecap="round"/>
  <path d="M684 198L700 212L684 226" stroke="#2DD4BF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="623" y="190" fill="#5EEAD4" font-family="Inter, Segoe UI, sans-serif" font-size="14">allowed roots</text>

  <g>
    <rect x="716" y="116" width="186" height="192" rx="18" fill="#1F2937" stroke="#64748B"/>
    <text x="756" y="166" fill="#F8FAFC" font-family="Inter, Segoe UI, sans-serif" font-size="22" font-weight="700">Your PC</text>
    <rect x="748" y="194" width="122" height="24" rx="8" fill="#334155"/>
    <rect x="748" y="232" width="88" height="24" rx="8" fill="#334155"/>
    <rect x="748" y="270" width="106" height="24" rx="8" fill="#334155"/>
  </g>

  <text x="62" y="350" fill="#CBD5E1" font-family="Inter, Segoe UI, sans-serif" font-size="16">Start with one small folder. Move to broader access only on a private trusted machine.</text>
</svg>
